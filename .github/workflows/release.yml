name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.7"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-desktop:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: client-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output: client-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: client-darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/client

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          go get golang.org/x/mobile/bind@latest
          gomobile init

      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{printf "%d%03d%03d", $1, $2, $3}')
          # Ensure versionCode is at least 1
          if [ "$VERSION_CODE" -eq 0 ]; then VERSION_CODE=1; fi
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" mobile/android/app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION\"/" mobile/android/app/build.gradle.kts
          echo "Set versionName=$VERSION versionCode=$VERSION_CODE"

      - name: Build Go AAR
        run: |
          mkdir -p mobile/android/app/libs
          gomobile bind -ldflags="-checklinkname=0" -target android -androidapi 24 -o mobile/android/app/libs/bind.aar ./mobile/bind/

      - name: Build and sign APK
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        working-directory: mobile/android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease || gradle assembleRelease
          echo "$KEYSTORE_FILE" | base64 -d > ../../keystore.jks
          apksigner sign \
            --ks ../../keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk
          mv app/build/outputs/apk/release/app-release-unsigned.apk ../../app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk

  build-ios:
    runs-on: ubuntu-latest

    steps:
      - name: iOS build skipped
        run: |
          echo "::notice::iOS build skipped: no Apple Developer ID configured. Set up Apple signing secrets to enable iOS builds."

  build-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build-desktop, build-android, build-ios, build-server]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/client-windows-amd64.exe
            artifacts/client-darwin-amd64
            artifacts/client-darwin-arm64
            artifacts/app-release.apk
          generate_release_notes: true

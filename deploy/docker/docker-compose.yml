services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "9443:9443"
      - "9000:9000"
    environment:
      - SIREN_SLACK_WEBHOOK=${SIREN_SLACK_WEBHOOK:-}
      - VPN_PSK=${VPN_PSK:?VPN_PSK is required}
    command: ["--signal=0.0.0.0:9443", "--psk=${VPN_PSK}"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

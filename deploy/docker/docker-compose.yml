services:
  server:
    image: ghcr.io/fokir/vk-call-proxy:${IMAGE_TAG:-main}
    ports:
      - "${LISTEN_PORT:-9000}:9000/udp"
    environment:
      - VPN_TOKEN=${VPN_TOKEN:-}
      - VK_CALL_LINK=${VK_CALL_LINK:-}
      - TURN_CONNS=${TURN_CONNS:-4}
      - SIREN_SLACK_WEBHOOK=${SIREN_SLACK_WEBHOOK:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-256M}
          cpus: "${CPU_LIMIT:-1.0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
